<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>&#x304a;&#x5f01;&#x5f53;&#x30e9;&#x30d9;&#x30eb;&#x30e1;&#x30fc;&#x30ab;&#x30fc; V2.2</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/lib/browser.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container no-print">
        <header class="app-header">
            <div class="header-content">
                <h1>🍱 &#x304a;&#x5f01;&#x5f53;&#x30e9;&#x30d9;&#x30eb;&#x30e1;&#x30fc;&#x30ab;&#x30fc;</h1>
                <p>&#x30d6;&#x30e9;&#x30a6;&#x30b6;&#x3067;&#x5165;&#x529b;&#x3001;&#x30ef;&#x30f3;&#x30af;&#x30ea;&#x30c3;&#x30af;&#x3067;&#x5370;&#x5237;</p>
            </div>
            <div style="display: flex; align-items: center; gap: 1rem;">
                <button id="print-btn-header" class="print-btn primary-btn">&#x1f5a8; &#x30e9;&#x30d9;&#x30eb;&#x3092;&#x5370;&#x5237;</button>
            </div>
        </header>

        <div class="tabs-container">
            <button class="tab-btn active" data-target="tab-quick-print">&#x2728; &#x304b;&#x3093;&#x305f;&#x3093;&#x5370;&#x5237;</button>
            <button class="tab-btn" data-target="tab-editor">&#x2699; &#x8a73;&#x7d30;&#x7de8;&#x96c6;</button>
            <button class="tab-btn" data-target="tab-config">&#x1f3e0; &#x5e97;&#x8217;&#x8a2d;&#x5b9a;</button>
        </div>

        <main class="app-main">
            <!-- Editor Section -->
            <section class="editor-section">
                <!-- Tab: Quick Print -->
                <div id="tab-quick-print" class="tab-content active">
                    <div class="card">
                        <div class="card-header"><h2>&#x2728; &#x304b;&#x3093;&#x305f;&#x3093;&#x5370;&#x5237;</h2></div>
                        <div class="card-body">
                            <div class="form-group">
                                <label>&#x30e1;&#x30cb;&#x30e5;&#x30fc;&#x3092;&#x907f;&#x629e;</label>
                                <select id="quick-preset-select" class="form-control name-input-large">
                                    <option value="">-- &#x9078;&#x629e;&#x3057;&#x3066;&#x304f;&#x3060;&#x3055;&#x3044; --</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>&#x5370;&#x5237;&#x679a;&#x6570;</label>
                                <input type="number" id="print-count" class="form-control" value="1" min="1">
                            </div>
                            <button id="print-btn-footer" class="print-btn primary-btn full-width" style="margin-top:2rem; padding:1.5rem;">&#x1f680; &#x5370;&#x5237;&#x3059;&#x308b;</button>
                        </div>
                    </div>
                </div>

                <!-- Tab: Editor -->
                <div id="tab-editor" class="tab-content">
                    <div class="card">
                        <div class="card-header"><h2>&#x30e9;&#x30d9;&#x30eb;&#x5185;&#x5bb9;&#x306e;&#x7de8;&#x96c6;</h2></div>
                        <div class="card-body">
                            <div class="form-group">
                                <label>&#x5546;&#x54c1;&#x540d; <button class="mic-btn" data-target="product-name">&#x1f3a4;</button></label>
                                <div class="form-row">
                                    <input type="text" id="product-name" class="form-control" placeholder="&#x4f8b;&#xff1a;&#x30c1;&#x30ad;&#x30f3;&#x5357;&#x86ee;&#x5f01;&#x5f53;">
                                    <button id="auto-fill-btn" class="action-btn auto-fill-btn" style="margin-top:0;">&#x1f684; &#x81ea;&#x52d5;&#x5165;&#x529b;</button>
                                </div>
                            </div>

                            <!-- RICE SELECTOR -->
                            <div class="form-group rice-selector" style="background:#fefce8; padding:10px; border-radius:8px; border:1px solid #fef08a;">
                                <label><b>&#x1f35a; &#x304a;&#x7c73;&#x306e;&#x9078;&#x629e;</b></label>
                                <div class="form-row">
                                    <label style="display:inline-flex; align-items:center; gap:5px; margin-bottom:0;">
                                        <input type="radio" name="rice-type" value="white" checked> &#x767d;&#x7c73;
                                    </label>
                                    <label style="display:inline-flex; align-items:center; gap:5px; margin-bottom:0;">
                                        <input type="radio" name="rice-type" value="brown"> &#x7344;&#x7c73;
                                    </label>
                                    <label style="display:inline-flex; align-items:center; gap:5px; margin-bottom:0;">
                                        <input type="radio" name="rice-type" value="none"> &#x306a;&#x3057;(&#x304a;&#x304b;&#x305a;&#x306e;&#x307f;)
                                    </label>
                                </div>
                            </div>

                            <div class="form-group">
                                <label>&#x539f;&#x6750;&#x6599;&#x540d; <button class="mic-btn" data-target="ingredients">&#x1f3a4;</button></label>
                                <textarea id="ingredients" class="form-control" rows="5"></textarea>
                                <button id="smart-import-btn" class="action-btn" style="background:#6366f1; color:white; margin-top:5px;">&#x2728; &#x30b9;&#x30de;&#x30fc;&#x30c8;&#x6210;&#x5f62;</button>
                            </div>

                            <div class="form-row">
                                <div class="form-group half">
                                    <label>&#x6d88;&#x8cbb;&#x671f;&#x9650;</label>
                                    <select id="consume-days" class="form-control">
                                        <option value="0">&#x5f53;&#x65e5;</option>
                                        <option value="1" selected>&#x7fcc;&#x65e5;</option>
                                        <option value="2">2&#x65e5;&#x5f8c;</option>
                                    </select>
                                </div>
                                <div class="form-group half">
                                    <label>&#x4fdd;&#x5b58;&#x65b9;&#x6cd5;</label>
                                    <input type="text" id="store-method" class="form-control" value="&#x76f4;&#x5c04;&#x65e5;&#x5149;&#x3092;&#x907f;&#x3051;&#x4fdd;&#x5b58;">
                                </div>
                            </div>

                            <div class="nutrition-grid" style="display:grid; grid-template-columns: repeat(5, 1fr); gap:10px;">
                                <div class="form-group"><label>&#x7131;&#x91cf;</label><input type="text" id="calories" class="form-control"></div>
                                <div class="form-group"><label>&#x86cb;&#x767d;</label><input type="text" id="protein" class="form-control"></div>
                                <div class="form-group"><label>&#x8102;&#x8cea;</label><input type="text" id="fat" class="form-control"></div>
                                <div class="form-group"><label>&#x70ad;&#x7269;</label><input type="text" id="carb" class="form-control"></div>
                                <div class="form-group"><label>&#x98df;&#x5869;</label><input type="text" id="salt" class="form-control"></div>
                            </div>

                            <div class="divider"></div>

                            <div class="form-group">
                                <label class="toggle-switch">
                                    <input type="checkbox" id="use-qrcode1">
                                    <span class="toggle-slider"></span>
                                    <span class="toggle-label">QR&#x30b3;&#x30fc;&#x30c9;&#x3092;&#x8868;&#x793a;</span>
                                </label>
                                <input type="text" id="qrcode1-value" class="form-control" style="margin-top:5px;" placeholder="URL&#x306a;&#x3069;">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Tab: Config -->
                <div id="tab-config" class="tab-content">
                    <div class="card">
                        <div class="card-header"><h2>&#x1f3e0; &#x5e97;&#x8217;&#x8a2d;&#x5b9a;</h2></div>
                        <div class="card-body">
                            <div class="form-group">
                                <label>&#x30d7;&#x30ed;&#x30d5;&#x30a1;&#x30a4;&#x30eb;</label>
                                <select id="store-profile-select" class="form-control">
                                    <option value="A">&#x5e97;&#x8217; A</option>
                                    <option value="B">&#x5e97;&#x8217; B</option>
                                    <option value="C">&#x5e97;&#x8217; C</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>&#x8868;&#x793a;&#x540d;</label>
                                <input type="text" id="manufacturer-name" class="form-control">
                            </div>
                            <div class="form-group">
                                <label>&#x6240;&#x5728;&#x5730;</label>
                                <input type="text" id="address" class="form-control">
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Preview Section -->
            <section class="preview-section">
                <div class="sticky">
                    <div class="card">
                        <div class="card-header"><h2>&#x30d7;&#x30ec;&#x30d3;&#x30e5;&#x30fc;</h2></div>
                        <div class="card-body preview-container">
                            <div id="print-target" class="label-box">
                                <div class="label-inner">
                                    <div class="label-header">
                                        <div id="preview-name" class="label-title"></div>
                                    </div>
                                    <table class="label-table">
                                        <tr><th class="label-th">&#x539f;&#x6750;&#x6599;&#x540d;</th><td id="preview-ingredients" class="label-td val-ingredients"></td></tr>
                                        <tr><th class="label-th">&#x6d88;&#x8cbb;&#x671f;&#x9650;</th><td id="preview-consume" class="label-td font-bold"></td></tr>
                                        <tr><th class="label-th">&#x4fdd;&#x5b58;&#x65b9;&#x6cd5;</th><td id="preview-store" class="label-td val-store"></td></tr>
                                    </table>
                                    <div class="nutrition-box">
                                        <div class="nutrition-grid">
                                            <span>&#x7131;&#x91cf;<span id="preview-calories">-</span>kcal</span>
                                            <span>&#x86cb;&#x767d;<span id="preview-protein">-</span>g</span>
                                            <span>&#x8102;&#x8cea;<span id="preview-fat">-</span>g</span>
                                            <span>&#x70ad;&#x7269;<span id="preview-carb">-</span>g</span>
                                            <span>&#x98df;&#x5869;<span id="preview-salt">-</span>g</span>
                                        </div>
                                    </div>
                                    <div class="label-footer">
                                        <div class="price-box">
                                            <span class="price-value" id="preview-price">-</span><span class="yen">&#x5186;</span>
                                        </div>
                                        <img id="preview-qrcode1" class="qr-canvas" style="display:none;">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="print-spool" class="print-only"></div>

    <!-- Original script.js contains logic for voice, rice, and dict -->
    <script src="script.js"></script>
</body>
</html>
