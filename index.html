<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>&#x304A;&#x5f01;&#x5f53;&#x30e9;&#x30d9;&#x30eb;&#x30e1;&#x30fc;&#x30ab;&#x30fc;</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/lib/browser.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container no-print">
        <header class="app-header">
            <div class="header-content">
                <h1>🍱 &#x304A;&#x5f01;&#x5f53;&#x30e9;&#x30d9;&#x30eb;&#x30e1;&#x30fc;&#x30ab;&#x30fc;</h1>
                <p>&#x30d7;&#x30ed;&#x4ed5;&#x69d8;&#x306e;&#x30e9;&#x30d9;&#x30eb;&#x3092;&#x7c21;&#x5358;&#x4f5c;&#x6210;</p>
            </div>
            <button id="print-btn-header" class="print-btn primary-btn">&#x1f5a8;&#xfe0f; &#x30e9;&#x30d9;&#x30eb;&#x3092;&#x5370;&#x5237;</button>
        </header>

        <div class="tabs-container">
            <button class="tab-btn active" data-target="tab-editor">&#x2699;&#xfe0f; &#x7ba1;&#x7406;&#x30fb;&#x7de8;&#x96c6;</button>
            <button class="tab-btn" data-target="tab-quick-print">&#x2728; &#x304b;&#x3093;&#x305f;&#x3093;&#x5370;&#x5237;</button>
        </div>

        <main class="app-main">
            <!-- Editor Side -->
            <section class="editor-section">
                <div id="tab-editor" class="tab-content active">
                    <div class="card">
                        <div class="card-header">
                            <h2>&#x30e9;&#x30d9;&#x30eb;&#x5185;&#x5bb9;&#x306e;&#x7de8;&#x96c6;</h2>
                            <span class="badge">PRO</span>
                        </div>
                        <div class="card-body">
                            <div class="form-group">
                                <label>&#x540d;&#x79f0; (&#x5546;&#x54c1;&#x540d;) <span class="required">*</span></label>
                                <div class="form-row">
                                    <input type="text" id="product-name" class="form-control name-input-large" style="flex:1;" placeholder="&#x4f8b;: &#x30c1;&#x30ad;&#x30f3;&#x5357;&#x86ee;&#x5f01;&#x5f53;">
                                    <button id="auto-fill-btn" class="action-btn auto-fill-btn" style="margin-top:0; height:100%;">&#x1f684; &#x81ea;&#x52d5;&#x5165;&#x529b;</button>
                                </div>
                            </div>

                            <div class="form-group">
                                <label>&#x539f;&#x6750;&#x6599;&#x540d;</label>
                                <textarea id="ingredients" class="form-control" rows="4"></textarea>
                            </div>

                            <div class="form-row">
                                <div class="form-group half">
                                    <label>&#x6d88;&#x8cbb;&#x671f;&#x9650; (&#x65e5;&#x6570;)</label>
                                    <select id="consume-days" class="form-control">
                                        <option value="0">&#x5f53;&#x65e5;</option>
                                        <option value="1" selected>&#x7fcc;&#x65e5;</option>
                                        <option value="2">2&#x65e5;&#x5f8c;</option>
                                    </select>
                                </div>
                                <div class="form-group half">
                                    <label>&#x4fdd;&#x5b58;&#x65b9;&#x6cd5;</label>
                                    <input type="text" id="store-method" class="form-control" value="&#x76f4;&#x5c04;&#x65e5;&#x5149;&#x3092;&#x907f;&#x3051;&#x4fdd;&#x5b58;">
                                </div>
                            </div>

                            <div class="divider"></div>
                            
                            <h3 class="sub-heading">&#x6844;&#x5185;&#x5bb9;&#uff08;&#x88dc;&#x8db3;&#uff09;</h3>
                            <div class="form-group">
                                <label class="toggle-switch">
                                    <input type="checkbox" id="use-qrcode1">
                                    <span class="toggle-slider"></span>
                                    <span class="toggle-label">QR&#x30b3;&#x30fc;&#x30c9;1&#x3092;&#x8868;&#x793a;</span>
                                </label>
                                <div id="qrcode1-wrapper" style="display:none; margin-top:10px;">
                                    <input type="text" id="qrcode1-value" class="form-control" placeholder="URL&#x306a;&#x3069;">
                                </div>
                            </div>

                            <div class="form-group">
                                <label class="toggle-switch">
                                    <input type="checkbox" id="toggle-recommendation">
                                    <span class="toggle-slider"></span>
                                    <span class="toggle-label">&#x300c;&#x672c;&#x65e5;&#x4e2d;&#x306b;&#x304a;&#x53ec;&#x3057;&#x4e0a;&#x304c;&#x308a;&#x304f;&#x3060;&#x3055;&#x3044;&#x300d;</span>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="tab-quick-print" class="tab-content">
                    <div class="card">
                        <div class="card-header">
                            <h2>&#x2728; &#x304b;&#x3093;&#x305f;&#x3093;&#x5370;&#x5237;</h2>
                        </div>
                        <div class="card-body">
                            <div class="presets-group">
                                <label>&#x30e1;&#x30cb;&#x30e5;&#x30fc;&#x9078;&#x629e;</label>
                                <select id="quick-preset-select" class="form-control name-input-large">
                                    <option value="">-- &#x9078;&#x629e;&#x3057;&#x3066;&#x304f;&#x3060;&#x3055;&#x3044; --</option>
                                </select>
                            </div>
                            <button id="print-btn-footer" class="print-btn primary-btn full-width" style="margin-top:20px; padding:1.5rem;">&#x1f680; &#x4eca;&#x3059;&#x3050;&#x5370;&#x5237;</button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Preview Side -->
            <section class="preview-section">
                <div class="sticky">
                    <div class="card">
                        <div class="card-header">
                            <h2>&#x30d7;&#x30ec;&#x30d3;&#x30e5;&#x30fc;</h2>
                        </div>
                        <div class="card-body preview-container">
                            <div id="print-target" class="label-box">
                                <div class="label-inner">
                                    <div class="label-header">
                                        <div id="preview-recommendation" class="recommendation-badge" style="display:none;">&#x672c;&#x65e5;&#x4e2d;&#x306b;&#x304a;&#x53ec;&#x3057;&#x4e0a;&#x304c;&#x308a;&#x304f;&#x3060;&#x3055;&#x3044;&#x3002;</div>
                                        <div id="preview-name" class="label-title"></div>
                                    </div>
                                    <table class="label-table">
                                        <tr><th class="label-th">&#x539f;&#x6750;&#x6599;&#x540d;</th><td id="preview-ingredients" class="label-td val-ingredients"></td></tr>
                                        <tr><th class="label-th">&#x6d88;&#x8cbb;&#x671f;&#x9650;</th><td id="preview-consume" class="label-td font-bold"></td></tr>
                                        <tr><th class="label-th">&#x4fdd;&#x5b58;&#x65b9;&#x6cd5;</th><td id="preview-store" class="label-td val-store"></td></tr>
                                    </table>
                                    <div class="nutrition-box">
                                        <div class="nutrition-grid">
                                            <span>&#x7131;&#x91cf;<span id="preview-calories">-</span>kcal</span>
                                            <span>&#x86cb;&#x767d;<span id="preview-protein">-</span>g</span>
                                            <span>&#x8102;&#x8cea;<span id="preview-fat">-</span>g</span>
                                            <span>&#x70ad;&#x7269;<span id="preview-carb">-</span>g</span>
                                            <span>&#x98df;&#x5869;<span id="preview-salt">-</span>g</span>
                                        </div>
                                        <div style="font-size: 5pt; text-align: right;">(&#x63a8;&#x5b9a;&#x5024;)</div>
                                    </div>
                                    <div class="label-footer">
                                        <div class="price-box">
                                            <span class="price-label">&#x672c;&#x4f53;&#x4fa1;&#x683c;</span><br>
                                            <span class="price-value" id="preview-price-tax">-</span><span class="yen">&#x5186;</span>
                                        </div>
                                        <div style="display: flex; gap: 4px;">
                                            <img id="preview-qrcode1" class="qr-canvas" style="display:none;">
                                            <img id="preview-barcode" style="display:none; width: 80px; height: 30px;">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="print-spool" class="print-only"></div>

    <script src="script_v3.js"></script>
</body>
</html>
